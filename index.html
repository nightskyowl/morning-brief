<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Brief</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .container { max-width: 680px; width: 100%; text-align: center; }
    .badge { display: inline-block; background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.35rem 0.85rem; border-radius: 999px; margin-bottom: 2rem; }
    h1 { font-size: 2.5rem; font-weight: 700; color: #f1f5f9; margin-bottom: 1rem; }
    p { color: #94a3b8; font-size: 1.1rem; line-height: 1.7; margin-bottom: 2rem; }
    .clock { font-size: 3rem; margin-bottom: 1.5rem; }
    .footer { margin-top: 3rem; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="clock">☕</div>
    <div class="badge">Morning Brief</div>
    <h1>Your daily AI digest is being set up</h1>
    <p>Every morning at 10am Dublin time, this page will be updated with the latest AI/ML news, open source discoveries, and Claude updates — curated just for you.</p>
    <div class="footer">Powered by Claude Code Routines · nightskyowl</div>
  </div>
</body>
</html>
